<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>打卡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --primary:#c77dff;
  --accent:#ff6b9d;
  --bg:#0d0d1f;
  --card:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.09);
  --txt:rgba(255,255,255,0.6);
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;color:#fff;background:var(--bg)}

/* ── BG ── */
#bg{position:fixed;inset:0;background:linear-gradient(160deg,#1e1008 0%,#180b1e 48%,#0e1220 100%);background-size:cover;background-position:center;z-index:0}
#bg::after{content:'';position:absolute;inset:0;background:rgba(8,4,0,.38)}

/* ── BG SETTINGS ── */
#bg-mod{position:fixed;inset:0;z-index:200;display:flex;align-items:flex-end}
#bg-mod-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px)}
#bg-mod-sheet{position:relative;z-index:1;width:100%;max-width:480px;margin:0 auto;background:#faf8f5;border-radius:28px 28px 0 0;padding:0 0 env(safe-area-inset-bottom)}
.bg-sheet-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 14px}
.bg-sheet-hd h3{font-size:16px;font-weight:700;color:#1c1917}
.bg-sheet-close{background:transparent;border:none;font-size:22px;color:#a8a29e;cursor:pointer;line-height:1;padding:4px}
.bg-preset-row{display:flex;gap:10px;padding:0 16px;overflow-x:auto;padding-bottom:4px}
.bg-preset-row::-webkit-scrollbar{display:none}
.bg-preset{width:72px;height:72px;border-radius:16px;flex-shrink:0;cursor:pointer;position:relative;border:2.5px solid transparent;transition:border-color .18s;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;overflow:hidden}
.bg-preset.on{border-color:#d4a574}
.bg-preset-label{font-size:11px;font-weight:600;color:rgba(255,255,255,.9);text-shadow:0 1px 4px rgba(0,0,0,.6);position:relative;z-index:1}
.bg-preset-check{position:absolute;top:5px;right:6px;font-size:13px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.8);font-weight:700}
.bg-preset-custom{background:linear-gradient(135deg,#e8e5e0,#d4cfc8);border:2px dashed #c4bdb5}
.bg-url-section{margin:14px 16px 0}
.bg-url-label{font-size:12px;color:#a8a29e;font-weight:600;margin-bottom:6px;display:block;letter-spacing:.5px}
.bg-url-input{width:100%;padding:12px 14px;border-radius:13px;border:1.5px solid #e7e5e4;background:#fff;font-size:14px;color:#1c1917;outline:none;font-family:inherit}
.bg-url-input:focus{border-color:#d4a574}
.bg-save-btn{display:block;width:calc(100% - 32px);margin:14px 16px 16px;padding:14px;background:linear-gradient(to right,#d4a574,#e8c9a0);border:none;border-radius:15px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.bg-save-btn:active{transform:scale(.98)}
.bg-section-title{font-size:12px;color:#a8a29e;font-weight:600;padding:0 16px;margin-bottom:10px;letter-spacing:.5px}

/* ── DATA MANAGER ── */
#data-mod{position:fixed;inset:0;z-index:200;display:flex;align-items:flex-end}
#data-mod-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px)}
#data-mod-sheet{position:relative;z-index:1;width:100%;max-width:480px;margin:0 auto;background:#faf8f5;border-radius:28px 28px 0 0;padding-bottom:env(safe-area-inset-bottom)}
.dm-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 16px}
.dm-hd h3{font-size:16px;font-weight:700;color:#1c1917}
.dm-close{background:transparent;border:none;font-size:22px;color:#a8a29e;cursor:pointer;line-height:1;padding:4px}
.dm-body{padding:0 16px 20px;display:flex;flex-direction:column;gap:12px}
.dm-card{background:#fff;border:1px solid #e7e5e4;border-radius:18px;padding:16px}
.dm-card-title{font-size:14px;font-weight:600;color:#1c1917;margin-bottom:4px}
.dm-card-desc{font-size:12px;color:#a8a29e;line-height:1.6;margin-bottom:12px}
.dm-btn{width:100%;padding:13px;border:none;border-radius:13px;font-size:14px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .12s}
.dm-btn:active{transform:scale(.97)}
.dm-btn-export{background:linear-gradient(to right,#d4a574,#e8c9a0);color:#fff}
.dm-btn-import{background:#f5f4f2;color:#1c1917;border:1.5px solid #e0ddd9}
.dm-info-bar{background:#fef7ee;border:1px solid #f0e0c8;border-radius:12px;padding:10px 14px;font-size:12px;color:#b8956f;line-height:1.6}
.dm-info-bar strong{color:#a07040}

/* ── APP SHELL ── */
#app{position:relative;z-index:1;height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}

/* ── SCROLL AREA ── */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 14px 30px}
.scroll::-webkit-scrollbar{display:none}

/* ── SHARED ── */
.fullmod{position:fixed;inset:0;z-index:150;display:flex;flex-direction:column;background:#0d0d1f}
.mod-hd{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0;background:#0d0d1f}
.mod-hd h2{font-size:17px;font-weight:600}
.close-btn{background:transparent;border:none;color:var(--txt);font-size:22px;cursor:pointer;line-height:1}
.hidden{display:none!important}

/* ── DAKA (打卡) LIST ── */
.daka-wrap{padding:4px 0 30px}
.daka-hd{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 2px 16px}
.daka-hd-text h2{font-size:22px;font-weight:700;color:#fff;margin-bottom:3px}
.daka-hd-text p{font-size:13px;color:rgba(255,255,255,.5)}
.daka-add{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(12px);color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
.daka-empty{text-align:center;padding:60px 20px;color:rgba(255,255,255,.3);font-size:14px;line-height:2.4}

/* ── DAKA v2 Universal Progress Cards ── */
.dk2-card{background:var(--card);backdrop-filter:blur(18px);border:1px solid var(--border);border-radius:22px;padding:18px 16px 14px;margin-bottom:14px;cursor:pointer;transition:transform .15s;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden}
.dk2-card:active{transform:scale(.98)}
.dk2-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px}
.dk2-icon{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15)}
.dk2-info{flex:1;min-width:0}
.dk2-name{font-size:16px;font-weight:600;color:#fff;margin-bottom:2px}
.dk2-meta{font-size:12px;color:rgba(255,255,255,.42);margin-top:2px}
.dk2-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(199,125,255,.18);color:var(--primary);font-weight:600;flex-shrink:0;align-self:flex-start}
.dk2-prog-wrap{margin-bottom:10px}
.dk2-prog-labels{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;gap:8px}
.dk2-prog-done{font-size:13px;font-weight:600;color:rgba(255,255,255,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dk2-prog-remain{font-size:12px;color:rgba(255,255,255,.4);white-space:nowrap;flex-shrink:0}
.dk2-bar{height:7px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden}
.dk2-fill{height:100%;border-radius:4px;background:linear-gradient(to right,var(--primary),#ff6b9d);transition:width .6s ease}
.dk2-footer{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid rgba(255,255,255,.07);font-size:12px;color:rgba(255,255,255,.38)}

/* ── DAKA DETAIL MODAL ── */
#daka-mod{background:#faf8f5}
#daka-mod .mod-hd{background:#faf8f5;border-bottom:1px solid rgba(0,0,0,.07)}
#daka-mod .mod-hd h2{color:#1c1917;font-size:17px}
#daka-mod .close-btn{color:#78716c}
.dkm-scroll{flex:1;overflow-y:auto;padding:0 16px 108px}
.dkm-scroll::-webkit-scrollbar{display:none}
.dkm-warm{background:linear-gradient(135deg,#f5ebe0,#faf5ef);border:1px solid rgba(184,149,111,.2);border-radius:24px;padding:20px;margin-bottom:16px}
.dkm-glass{background:rgba(255,255,255,.6);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.85);border-radius:24px;padding:20px;margin-bottom:16px}
.dkm-ring-warm{stroke:#d4a574}
.dkm-circ-prog{transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset 1s ease}
.dkm-fix{position:fixed;bottom:0;left:0;right:0;padding:16px;backdrop-filter:blur(20px);background:rgba(250,248,245,.9);border-top:1px solid rgba(0,0,0,.06);z-index:160}
.dkm-btn-warm{background:linear-gradient(to right,#d4a574,#e8c9a0);box-shadow:0 4px 14px rgba(212,165,116,.4)}
.dkm-btn-base{width:100%;padding:16px;border:none;border-radius:18px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:transform .12s;-webkit-tap-highlight-color:transparent}
.dkm-btn-base:active{transform:scale(.97)}
.dkm-textarea{width:100%;padding:13px 14px;border-radius:14px;border:1.5px solid #e7e5e4;background:rgba(255,255,255,.6);font-size:14px;color:#1c1917;outline:none;resize:none;font-family:inherit;transition:border-color .2s}
.dkm-textarea:focus{border-color:#d4a574}

/* ── Increment input ── */
.dkm-inc-row{display:flex;gap:10px;align-items:center;margin-bottom:12px}
.dkm-inc-input{flex:1;padding:12px 10px;border-radius:14px;border:1.5px solid #e7e5e4;background:rgba(255,255,255,.95);font-size:24px;font-weight:700;color:#1c1917;outline:none;font-family:inherit;text-align:center;transition:border-color .2s;-webkit-appearance:none;-moz-appearance:textfield}
.dkm-inc-input::-webkit-outer-spin-button,.dkm-inc-input::-webkit-inner-spin-button{-webkit-appearance:none}
.dkm-inc-input:focus{border-color:#d4a574}
.dkm-inc-unit-lbl{font-size:15px;font-weight:600;color:#78716c;white-space:nowrap;min-width:36px;text-align:left}

/* ── NEW TASK MODAL ── */
#daka-new-mod{background:#faf8f5}
#daka-new-mod .mod-hd{background:#faf8f5;border-bottom:1px solid rgba(0,0,0,.07)}
#daka-new-mod .mod-hd h2{color:#1c1917}
#daka-new-mod .close-btn{color:#78716c}
.dkn-scroll{flex:1;overflow-y:auto;padding:20px 16px 36px}
.dkn-scroll::-webkit-scrollbar{display:none}
.dkn-label{font-size:12px;color:#a8a29e;font-weight:600;margin-bottom:7px;display:block;letter-spacing:.6px;text-transform:uppercase}
.dkn-input{width:100%;padding:13px 14px;border-radius:14px;border:1.5px solid #e7e5e4;background:#fff;font-size:15px;color:#1c1917;outline:none;font-family:inherit;transition:border-color .2s}
.dkn-input:focus{border-color:#d4a574}
.dkn-emoji-row{display:flex;gap:8px;flex-wrap:wrap}
.dkn-emoji{width:42px;height:42px;border-radius:11px;border:1.5px solid #e7e5e4;background:#fff;font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;-webkit-tap-highlight-color:transparent}
.dkn-emoji.on{border-color:#d4a574;background:#fef7ee}
.dkn-save{width:100%;padding:15px;background:linear-gradient(to right,#d4a574,#e8c9a0);border:none;border-radius:16px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;box-shadow:0 4px 14px rgba(212,165,116,.35)}
.dkn-save:active{transform:scale(.98)}
.dkn2-hint{font-size:12px;color:#b8b0a8;margin-top:5px;padding-left:2px;line-height:1.5}

/* ── Achievement overlay ── */
.achieve-ov{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fi .4s ease}
.achieve-center{text-align:center;position:relative;z-index:2;padding:0 28px}
.achieve-emoji{font-size:80px;display:block;animation:achievePop .65s cubic-bezier(.17,.67,.42,1.4) both}
.achieve-title{font-size:26px;font-weight:800;margin:14px 0 8px;color:var(--primary);text-shadow:0 0 24px rgba(199,125,255,.7);animation:achievePop .5s cubic-bezier(.17,.67,.42,1.4) .18s both}
.achieve-sub{font-size:15px;color:rgba(255,255,255,.72);animation:achievePop .4s ease .36s both}
.achieve-val{font-size:13px;color:rgba(255,255,255,.42);margin-top:6px;animation:achievePop .4s ease .5s both}
.achieve-tap{font-size:12px;color:rgba(255,255,255,.24);margin-top:38px;animation:achievePop .3s ease 1.9s both}
@keyframes achievePop{from{transform:scale(0) rotate(-10deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.confetti-piece{position:absolute;border-radius:2px;animation:confettiFall linear forwards;pointer-events:none}
@keyframes confettiFall{0%{transform:translateY(-12px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(560deg);opacity:0}}
</style>
</head>
<body>
<div id="bg"></div>
<div id="app">
  <div class="scroll">
    <div class="daka-wrap">
      <div class="daka-hd">
        <div class="daka-hd-text">
          <h2>打卡</h2>
          <p>记录每一步成长 ✨</p>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="daka-add" style="font-size:16px" onclick="openDataMgr()" title="备份与恢复">💾</button>
          <button class="daka-add" style="font-size:17px" onclick="openBgSettings()" title="背景设置">🎨</button>
          <button class="daka-add" onclick="openNewDaka()">＋</button>
        </div>
      </div>
      <div id="daka-list">
        <div class="daka-empty" id="daka-empty">还没有打卡任务<br>点击右上角 ＋ 创建第一个吧 ✨</div>
      </div>
    </div>
  </div>
</div>

<!-- Daka Detail Modal -->
<div class="fullmod hidden" id="daka-mod">
  <div class="mod-hd">
    <button class="close-btn" onclick="closeDakaMod()">←</button>
    <h2 id="dkm-title">打卡详情</h2>
    <button style="background:transparent;border:none;color:#a8a29e;font-size:22px;cursor:pointer;padding:4px 8px;line-height:1" onclick="confirmDeleteDaka()">⋯</button>
  </div>
  <div class="dkm-scroll" id="dkm-scroll"></div>
  <div class="dkm-fix" id="dkm-fix">
    <div class="dkm-inc-row">
      <input type="number" class="dkm-inc-input" id="dkm-inc-val" placeholder="1" min="0.01" step="0.1" value="1" inputmode="decimal">
      <span class="dkm-inc-unit-lbl" id="dkm-inc-unit">次</span>
    </div>
    <button class="dkm-btn-base dkm-btn-warm" id="dkm-submit-btn" onclick="submitDakaCheckin()">完成打卡 ✓</button>
  </div>
</div>

<!-- New Daka Task Modal -->
<div class="fullmod hidden" id="daka-new-mod">
  <div class="mod-hd" style="background:#faf8f5;border-bottom:1px solid rgba(0,0,0,.07)">
    <button class="close-btn" style="color:#78716c" onclick="closeNewDaka()">✕</button>
    <h2 style="color:#1c1917">新建目标</h2>
  </div>
  <div class="dkn-scroll">
    <div style="display:flex;flex-direction:column;gap:20px">
      <div>
        <label class="dkn-label">目标名称</label>
        <input class="dkn-input" id="dkn-name" placeholder="例：读完100本书" maxlength="24">
      </div>
      <div>
        <label class="dkn-label">图标</label>
        <div class="dkn-emoji-row" id="dkn-emoji-row"></div>
      </div>
      <div>
        <label class="dkn-label">单位</label>
        <input class="dkn-input" id="dkn-unit" placeholder="例：本、小时、次、页、公里">
        <div class="dkn2-hint">每次打卡时记录数量的单位</div>
      </div>
      <div>
        <label class="dkn-label">目标总量（可选）</label>
        <input class="dkn-input" id="dkn-target" type="number" step="0.1" min="0.1" placeholder="留空则无限累计模式" inputmode="decimal">
        <div class="dkn2-hint">设定后会显示进度条，达成时触发庆祝 🎉</div>
      </div>
      <div>
        <label class="dkn-label">期待达成日（可选）</label>
        <input class="dkn-input" id="dkn-expect" type="date">
        <div class="dkn2-hint">温馨小提醒，不是截止日期，不强制哦 🌸</div>
      </div>
      <button class="dkn-save" onclick="saveDakaTask()">创建目标 ✨</button>
    </div>
  </div>
</div>

<!-- Data Manager Modal -->
<div class="hidden" id="data-mod">
  <div id="data-mod-backdrop" onclick="closeDataMgr()"></div>
  <div id="data-mod-sheet">
    <div class="dm-hd">
      <h3>备份与恢复</h3>
      <button class="dm-close" onclick="closeDataMgr()">✕</button>
    </div>
    <div class="dm-body">
      <div class="dm-info-bar" id="dm-stats">正在统计数据…</div>
      <div class="dm-card">
        <div class="dm-card-title">导出备份</div>
        <div class="dm-card-desc">将所有打卡任务和记录导出为 JSON 文件，保存到本地或云盘，换设备后可重新导入。</div>
        <button class="dm-btn dm-btn-export" onclick="exportData()">⬇ 导出备份文件</button>
      </div>
      <div class="dm-card">
        <div class="dm-card-title">导入备份</div>
        <div class="dm-card-desc">选择之前导出的 JSON 备份文件。<strong style="color:#c0392b">导入会覆盖当前所有数据</strong>，请确保已导出当前备份。</div>
        <button class="dm-btn dm-btn-import" onclick="triggerImport()">⬆ 选择备份文件</button>
        <input type="file" id="dm-file-input" accept=".json,application/json" style="display:none" onchange="importData(this)">
      </div>
    </div>
  </div>
</div>

<!-- BG Settings Modal -->
<div class="hidden" id="bg-mod">
  <div id="bg-mod-backdrop" onclick="closeBgSettings()"></div>
  <div id="bg-mod-sheet">
    <div class="bg-sheet-hd">
      <h3>背景设置</h3>
      <button class="bg-sheet-close" onclick="closeBgSettings()">✕</button>
    </div>
    <div class="bg-section-title">选择背景</div>
    <div class="bg-preset-row" id="bg-preset-row"></div>
    <div class="bg-url-section hidden" id="bg-url-section">
      <label class="bg-url-label">图片链接（URL）</label>
      <input class="bg-url-input" id="bg-url-input" type="url" placeholder="https://..." inputmode="url">
      <button class="bg-save-btn" onclick="saveBgCustomUrl()">应用图片</button>
    </div>
    <div id="bg-no-url-spacer" style="height:20px"></div>
  </div>
</div>

<!-- Achievement overlay -->
<div class="achieve-ov hidden" id="achieve-ov" onclick="closeAchieve()">
  <div id="achieve-confetti" style="position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:1"></div>
  <div class="achieve-center">
    <span class="achieve-emoji" id="achieve-emoji">🎉</span>
    <div class="achieve-title" id="achieve-title">目标达成！</div>
    <div class="achieve-sub" id="achieve-sub">太棒了！你真的做到了！</div>
    <div class="achieve-val" id="achieve-val"></div>
    <div class="achieve-tap">轻触继续</div>
  </div>
</div>

<script>
// ── 工具函数 ──
function dateStr(d = new Date()) {
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}

function fmtVal(v) {
  if (v === null || v === undefined) return '0';
  const n = Number(v);
  if (isNaN(n)) return '0';
  return String(parseFloat(n.toFixed(2)));
}

// ═══════════════════════════════════════════
// DAKA v2 — 通用打卡模块
// ═══════════════════════════════════════════
const DAKA_EMOJIS = ['📚','🏃','💧','🎯','✍️','🎸','🏋️','🌿','🎨','🍎','📝','💪','🌙','⭐','🔥','🎵','🏊','🧘','💻','🌸','🐾','🎀'];
let dakaNewEmoji = '📚';
let dakaCurrentId = null;

// ── 数据迁移 v1 → v2 ──
function migrateDakaDataIfNeeded() {
  if (localStorage.getItem('daka_v2')) return;
  try {
    const tasks = JSON.parse(localStorage.getItem('daka_tasks') || '[]');
    const newTasks = tasks.map(t => {
      if (t.schemaVersion === 2) return t;
      return {
        id: t.id, name: t.name, emoji: t.emoji || '📌',
        unit: t.unit || t.dailyUnit || '次',
        targetValue: t.type === 'deadline' ? (t.target || null) : null,
        expectDate: t.type === 'deadline' ? (t.endDate || null) : null,
        createdAt: t.createdAt, schemaVersion: 2
      };
    });
    localStorage.setItem('daka_tasks', JSON.stringify(newTasks));
    const logs = JSON.parse(localStorage.getItem('daka_logs') || '[]');
    const newLogs = logs.map(l => ({
      id: l.id, taskId: l.taskId,
      timestamp: l.createdAt || l.timestamp || new Date().toISOString(),
      date: l.date || (l.createdAt ? l.createdAt.slice(0,10) : dateStr()),
      incrementalValue: l.incrementalValue !== undefined ? l.incrementalValue : (l.count || 1),
      note: l.note || ''
    }));
    localStorage.setItem('daka_logs', JSON.stringify(newLogs));
    localStorage.setItem('daka_v2', '1');
  } catch(e) {}
}

// ── 存储 ──
function loadDakaTasks() {
  try { return JSON.parse(localStorage.getItem('daka_tasks') || '[]'); } catch(e) { return []; }
}
function saveDakaTasks(t) { localStorage.setItem('daka_tasks', JSON.stringify(t)); }
function loadDakaLogs() {
  try { return JSON.parse(localStorage.getItem('daka_logs') || '[]'); } catch(e) { return []; }
}
function saveDakaLogs(l) { localStorage.setItem('daka_logs', JSON.stringify(l)); }

// ── 计算 ──
function getTaskLogs(taskId) { return loadDakaLogs().filter(l => l.taskId === taskId); }
function _logVal(l) { return l.incrementalValue !== undefined ? l.incrementalValue : (l.count || 1); }
function getTaskCurrentValue(taskId) { return getTaskLogs(taskId).reduce((s,l) => s + _logVal(l), 0); }
function getTaskDateValue(taskId, ds) {
  return getTaskLogs(taskId)
    .filter(l => (l.date || (l.timestamp && l.timestamp.slice(0,10))) === ds)
    .reduce((s,l) => s + _logVal(l), 0);
}
function getTaskTodayValue(taskId) { return getTaskDateValue(taskId, dateStr()); }

// ── 列表渲染 ──
function renderDakaList() {
  const tasks = loadDakaTasks();
  const container = document.getElementById('daka-list');
  const emptyEl = document.getElementById('daka-empty');
  container.querySelectorAll('.dk2-card').forEach(el => el.remove());
  if (!tasks.length) { emptyEl.style.display = ''; return; }
  emptyEl.style.display = 'none';
  tasks.forEach(task => container.appendChild(buildDk2Card(task)));
}

function buildDk2Card(task) {
  const el = document.createElement('div');
  el.className = 'dk2-card';
  const current = getTaskCurrentValue(task.id);
  const target = task.targetValue;
  const unit = task.unit || '次';
  const todayVal = getTaskTodayValue(task.id);
  const pct = (target && target > 0) ? Math.min(100, Math.round(current / target * 100)) : null;
  const done = !!(target && current >= target);

  let metaText = '';
  if (task.expectDate) {
    const daysLeft = Math.ceil((new Date(task.expectDate) - new Date()) / 86400000);
    metaText = done ? '🎉 已达成目标！' :
      daysLeft > 0 ? `期待达成日还有 ${daysLeft} 天` :
      daysLeft === 0 ? '🌸 今天是期待达成日！' : '已过期待达成日';
  }

  let progHTML = '';
  if (target && target > 0) {
    const remain = Math.max(0, target - current);
    progHTML = `<div class="dk2-prog-wrap">
      <div class="dk2-prog-labels">
        <span class="dk2-prog-done">已完成: ${fmtVal(current)} / ${fmtVal(target)} ${unit}</span>
        <span class="dk2-prog-remain">${done ? '已达成 🎉' : `剩余 ${fmtVal(remain)}`}</span>
      </div>
      <div class="dk2-bar"><div class="dk2-fill" style="width:${pct}%"></div></div>
    </div>`;
  } else {
    progHTML = `<div class="dk2-prog-wrap">
      <div class="dk2-prog-labels">
        <span class="dk2-prog-done">已累计: ${fmtVal(current)} ${unit}</span>
        <span class="dk2-prog-remain">今日 +${fmtVal(todayVal)}</span>
      </div>
      <div class="dk2-bar"><div class="dk2-fill" style="width:100%;opacity:.32"></div></div>
    </div>`;
  }

  el.innerHTML = `
    <div class="dk2-top">
      <div class="dk2-icon">${task.emoji || '📌'}</div>
      <div class="dk2-info">
        <div class="dk2-name">${task.name}</div>
        ${metaText ? `<div class="dk2-meta">${metaText}</div>` : ''}
      </div>
      ${pct !== null ? `<div class="dk2-badge">${done ? '🏆 达成' : pct + '%'}</div>` : ''}
    </div>
    ${progHTML}
    <div class="dk2-footer">
      <span>今日 +${fmtVal(todayVal)} ${unit}</span>
      <span>${done ? '恭喜完成 🌸' : (target ? `已达 ${pct}%` : `共 ${fmtVal(current)} ${unit}`)}</span>
    </div>`;
  el.onclick = () => openDakaMod(task.id);
  return el;
}

// ── 详情弹窗 ──
function openDakaMod(taskId) {
  const task = loadDakaTasks().find(t => t.id === taskId);
  if (!task) return;
  dakaCurrentId = taskId;
  const unit = task.unit || '次';
  document.getElementById('dkm-title').textContent = task.name;
  document.getElementById('dkm-inc-unit').textContent = unit;
  document.getElementById('dkm-inc-val').value = '1';
  const btn = document.getElementById('dkm-submit-btn');
  btn.className = 'dkm-btn-base dkm-btn-warm';
  btn.textContent = '完成打卡 ✓';
  btn.style.opacity = '';
  document.getElementById('dkm-scroll').innerHTML = buildDakaDetailV2(task);
  document.getElementById('daka-mod').classList.remove('hidden');
}

function closeDakaMod() {
  document.getElementById('daka-mod').classList.add('hidden');
  dakaCurrentId = null;
}

function buildDakaDetailV2(task) {
  const logs = getTaskLogs(task.id);
  const current = getTaskCurrentValue(task.id);
  const target = task.targetValue;
  const unit = task.unit || '次';
  const pct = (target && target > 0) ? Math.min(100, Math.round(current / target * 100)) : null;
  const done = !!(target && current >= target);
  const remain = target ? Math.max(0, target - current) : null;
  const dash = 251.2;
  const offset = pct !== null ? dash - dash * pct / 100 : dash;

  const progressCard = `
    <div class="dkm-warm" style="margin-top:8px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
        <div>
          ${task.expectDate ? `<span style="display:inline-block;padding:4px 12px;background:rgba(255,255,255,.65);border-radius:20px;font-size:12px;font-weight:500;color:#b8956f;margin-bottom:8px">🌸 期待达成日: ${task.expectDate}</span>` : ''}
          <div style="font-size:17px;font-weight:600;color:#292524">${done ? '🎉 目标已达成！' : target ? `还需 ${fmtVal(remain)} ${unit}` : `已累计 ${fmtVal(current)} ${unit}`}</div>
          <div style="font-size:13px;color:#78716c;margin-top:4px">已完成: ${fmtVal(current)}${target ? ' / ' + fmtVal(target) : ''} ${unit}</div>
        </div>
        ${target ? `<div style="position:relative;width:80px;height:80px;flex-shrink:0">
          <svg style="width:100%;height:100%" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="40" fill="none" stroke="#e5e0d8" stroke-width="8"/>
            <circle cx="50" cy="50" r="40" fill="none" class="dkm-circ-prog dkm-ring-warm" stroke-width="8" stroke-linecap="round" stroke-dasharray="${dash}" stroke-dashoffset="${offset}"/>
          </svg>
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#b8956f">${pct}<span style="font-size:10px;color:#a8a29e;font-weight:400">%</span></div>
        </div>` : `<div style="font-size:52px;line-height:1">${task.emoji || '📌'}</div>`}
      </div>
      ${target ? `<div style="display:flex;justify-content:space-between;font-size:12px;color:#78716c;margin-bottom:6px"><span>进度</span><span>${fmtVal(current)} / ${fmtVal(target)} ${unit}</span></div>
      <div style="height:8px;background:rgba(0,0,0,.07);border-radius:4px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:linear-gradient(to right,#d4a574,#e8c9a0);border-radius:4px;transition:width .6s"></div>
      </div>` : ''}
    </div>`;

  const noteBox = `<div class="dkm-glass"><div style="font-size:14px;font-weight:600;color:#292524;margin-bottom:10px">打卡备注（选填）</div><textarea id="dkm-note" class="dkm-textarea" rows="2" placeholder="记录今天的感受…"></textarea></div>`;

  return `<div style="padding-top:6px">${progressCard}${buildDakaTimelineV2(task, logs)}${noteBox}</div>`;
}

function buildDakaTimelineV2(task, logs) {
  const dayMap = {};
  logs.forEach(l => {
    const d = l.date || (l.timestamp && l.timestamp.slice(0,10)) || dateStr();
    if (!dayMap[d]) dayMap[d] = [];
    dayMap[d].push(l);
  });
  const dates = Object.keys(dayMap).sort().reverse().slice(0, 14);
  const unit = task.unit || '次';
  const today = dateStr();
  const yesterday = dateStr(new Date(Date.now() - 86400000));
  if (!dates.length) return `<div class="dkm-glass"><div style="font-size:14px;font-weight:600;color:#292524;margin-bottom:14px">打卡记录</div><div style="text-align:center;padding:24px;color:#a8a29e;font-size:13px">还没有记录<br>完成第一次打卡吧 💪</div></div>`;
  const items = dates.map((date, i) => {
    const entries = dayMap[date];
    const val = entries.reduce((s,l) => s + _logVal(l), 0);
    const note = entries.find(l => l.note)?.note || '';
    const label = date === today ? '今日' : date === yesterday ? '昨天' : date;
    const isFirst = i === 0;
    return `<div style="display:flex;gap:14px;position:relative${i < dates.length-1 ? ';padding-bottom:18px' : ''}">
      ${i < dates.length-1 ? `<div style="position:absolute;left:19px;top:40px;bottom:0;width:1px;background:rgba(0,0,0,.08)"></div>` : ''}
      <div style="width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;z-index:1;${isFirst ? 'background:#d4a574;color:#fff;box-shadow:0 3px 10px rgba(212,165,116,.4)' : 'background:#fff;border:1px solid #d5d3d0;color:#a8a29e'}">${isFirst ? '✓' : '·'}</div>
      <div style="flex:1;padding-top:8px">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <div>
            <div style="font-size:14px;font-weight:500;color:#292524">+${fmtVal(val)} ${unit}</div>
            ${note ? `<div style="font-size:12px;color:#a8a29e;margin-top:2px;line-height:1.5">${note}</div>` : ''}
          </div>
          <span style="font-size:12px;color:${isFirst ? '#d4a574' : '#a8a29e'};font-weight:500;flex-shrink:0">${label}</span>
        </div>
      </div>
    </div>`;
  }).join('');
  return `<div class="dkm-glass"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px"><div style="font-size:14px;font-weight:600;color:#292524">打卡记录</div><span style="font-size:12px;color:#a8a29e">共 ${logs.length} 条</span></div><div style="position:relative">${items}</div></div>`;
}

// ── 提交打卡 ──
function submitDakaCheckin() {
  if (!dakaCurrentId) return;
  const task = loadDakaTasks().find(t => t.id === dakaCurrentId);
  if (!task) return;
  const incRaw = parseFloat(document.getElementById('dkm-inc-val')?.value);
  const inc = (!isNaN(incRaw) && incRaw > 0) ? incRaw : 1;
  const note = document.getElementById('dkm-note')?.value?.trim() || '';
  const prevTotal = getTaskCurrentValue(dakaCurrentId);
  const logs = loadDakaLogs();
  logs.push({ id:'log_'+Date.now(), taskId:dakaCurrentId, timestamp:new Date().toISOString(), date:dateStr(), incrementalValue:inc, note });
  saveDakaLogs(logs);
  const newTotal = getTaskCurrentValue(dakaCurrentId);
  if (task.targetValue && newTotal >= task.targetValue && prevTotal < task.targetValue) {
    closeDakaMod();
    renderDakaList();
    showAchieve(task, newTotal);
    return;
  }
  openDakaMod(dakaCurrentId);
  renderDakaList();
}

// ── 达成仪式 🎉 ──
function showAchieve(task, total) {
  const unit = task.unit || '次';
  document.getElementById('achieve-emoji').textContent = task.emoji || '🎉';
  document.getElementById('achieve-title').textContent = task.name + ' 达成！';
  document.getElementById('achieve-sub').textContent = '太棒了！坚持就是胜利！🌸';
  document.getElementById('achieve-val').textContent = `累计完成 ${fmtVal(total)} ${unit}`;
  const cc = document.getElementById('achieve-confetti');
  cc.innerHTML = '';
  const colors = ['#ff6b9d','#c77dff','#ffd700','#ff8c42','#4ecdc4','#a8e6cf','#ff6b6b','#ffffff'];
  for (let i = 0; i < 65; i++) {
    const p = document.createElement('div');
    const size = 5 + Math.random() * 9;
    p.className = 'confetti-piece';
    p.style.cssText = `left:${Math.random()*100}%;top:0;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.6+Math.random()*2.2}s;animation-delay:${Math.random()*1.4}s`;
    cc.appendChild(p);
  }
  document.getElementById('achieve-ov').classList.remove('hidden');
}

function closeAchieve() { document.getElementById('achieve-ov').classList.add('hidden'); }

// ── 删除任务 ──
function confirmDeleteDaka() {
  if (!dakaCurrentId) return;
  const task = loadDakaTasks().find(t => t.id === dakaCurrentId);
  if (!task || !confirm(`删除"${task.name}"？\n所有打卡记录将一并删除，不可恢复。`)) return;
  saveDakaTasks(loadDakaTasks().filter(t => t.id !== dakaCurrentId));
  saveDakaLogs(loadDakaLogs().filter(l => l.taskId !== dakaCurrentId));
  closeDakaMod();
  renderDakaList();
}

// ── 新建任务 ──
function openNewDaka() {
  dakaNewEmoji = '📚';
  document.getElementById('dkn-name').value = '';
  document.getElementById('dkn-unit').value = '';
  document.getElementById('dkn-target').value = '';
  document.getElementById('dkn-expect').value = '';
  document.getElementById('dkn-emoji-row').innerHTML = DAKA_EMOJIS.map(e =>
    `<div class="dkn-emoji${e === dakaNewEmoji ? ' on' : ''}" onclick="selectDakaEmoji('${e}',this)">${e}</div>`).join('');
  document.getElementById('daka-new-mod').classList.remove('hidden');
}

function closeNewDaka() { document.getElementById('daka-new-mod').classList.add('hidden'); }

function selectDakaEmoji(emoji, el) {
  dakaNewEmoji = emoji;
  document.querySelectorAll('.dkn-emoji').forEach(e => e.classList.remove('on'));
  el.classList.add('on');
}

function saveDakaTask() {
  const name = document.getElementById('dkn-name').value.trim();
  if (!name) { alert('请输入目标名称'); return; }
  const unit = document.getElementById('dkn-unit').value.trim() || '次';
  const targetRaw = parseFloat(document.getElementById('dkn-target').value);
  const targetValue = (!isNaN(targetRaw) && targetRaw > 0) ? targetRaw : null;
  const expectDate = document.getElementById('dkn-expect').value || null;
  const task = { id:'task_'+Date.now(), name, emoji:dakaNewEmoji, unit, targetValue, expectDate, createdAt:new Date().toISOString(), schemaVersion:2 };
  const tasks = loadDakaTasks(); tasks.push(task); saveDakaTasks(tasks);
  closeNewDaka();
  renderDakaList();
}

// 数据备份与恢复模块
// ═══════════════════════════════════════════
function openDataMgr() {
  const tasks = loadDakaTasks();
  const logs = loadDakaLogs();
  const today = dateStr();
  const todayLogs = logs.filter(l => (l.date || '') === today).length;
  document.getElementById('dm-stats').innerHTML =
    `当前共 <strong>${tasks.length}</strong> 个目标，<strong>${logs.length}</strong> 条打卡记录` +
    (todayLogs ? `，今日打卡 <strong>${todayLogs}</strong> 次` : '');
  document.getElementById('dm-file-input').value = '';
  document.getElementById('data-mod').classList.remove('hidden');
}

function closeDataMgr() {
  document.getElementById('data-mod').classList.add('hidden');
}

function exportData() {
  const tasks = loadDakaTasks();
  const logs = loadDakaLogs();
  if (!tasks.length && !logs.length) {
    alert('暂无数据可导出');
    return;
  }
  const payload = {
    appVersion: 1,
    exportTime: new Date().toISOString(),
    tasks,
    logs
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const d = dateStr().replace(/-/g, '');
  a.download = `打卡备份_${d}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function triggerImport() {
  document.getElementById('dm-file-input').click();
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data.tasks) || !Array.isArray(data.logs)) {
        alert('文件格式不正确，请选择正确的备份文件');
        return;
      }
      const taskCount = data.tasks.length;
      const logCount = data.logs.length;
      const curTaskCount = loadDakaTasks().length;
      const curLogCount = loadDakaLogs().length;
      let msg = `备份文件包含：\n• ${taskCount} 个目标\n• ${logCount} 条打卡记录\n\n`;
      if (curTaskCount || curLogCount) {
        msg += `当前本地有 ${curTaskCount} 个目标、${curLogCount} 条记录，导入后将被覆盖。\n\n`;
      }
      msg += '确认导入？';
      if (!confirm(msg)) { input.value = ''; return; }
      saveDakaTasks(data.tasks);
      saveDakaLogs(data.logs);
      localStorage.setItem('daka_v2', '1');
      closeDataMgr();
      renderDakaList();
      setTimeout(() => alert(`✅ 导入成功！\n已恢复 ${taskCount} 个目标、${logCount} 条记录`), 100);
    } catch(err) {
      alert('文件解析失败，请确认是完整的备份文件');
    }
    input.value = '';
  };
  reader.readAsText(file, 'utf-8');
}

const BG_PRESETS = [

  { id:'ocean',  label:'深海', gradient:'linear-gradient(160deg,#041420 0%,#09203a 50%,#0c1f30 100%)', overlay:'rgba(0,0,0,.42)' },
  { id:'rose',   label:'玫瑰', gradient:'linear-gradient(160deg,#200813 0%,#2c0b20 50%,#1a0510 100%)', overlay:'rgba(0,0,0,.4)' },
  { id:'forest', label:'林间', gradient:'linear-gradient(160deg,#04180d 0%,#091e12 50%,#040e08 100%)', overlay:'rgba(0,0,0,.42)' },

function loadBgConfig() {
  try { return JSON.parse(localStorage.getItem('bg_config') || 'null') || { id:'warm' }; } catch(e) { return { id:'warm' }; }
}
function saveBgConfig(cfg) { localStorage.setItem('bg_config', JSON.stringify(cfg)); }

function applyBg(cfg) {
  const bgEl = document.getElementById('bg');
  let afterCss = '';
  if (cfg.id === 'custom' && cfg.url) {
    bgEl.style.backgroundImage = `url(${JSON.stringify(cfg.url)})`;
    bgEl.style.background = '#0d0d1f';
    bgEl.style.backgroundSize = 'cover';
    bgEl.style.backgroundPosition = 'center';

    const preset = BG_PRESETS.find(p => p.id === cfg.id) || BG_PRESETS[0];

    bgEl.style.backgroundImage = '';

    bgEl.style.backgroundPosition = '';
    afterCss = `#bg::after{background:${preset.overlay}}`;

  let styleTag = document.getElementById('_bg_after');
  if (!styleTag) { styleTag = document.createElement('style'); styleTag.id='_bg_after'; document.head.appendChild(styleTag); }
  styleTag.textContent = afterCss;

function openBgSettings() {

  renderBgPresets(cfg);

    urlSec.classList.remove('hidden');

    spacer.style.display = '';

function closeBgSettings() { document.getElementById('bg-mod').classList.add('hidden'); }

function renderBgPresets(cfg) {
  const row = document.getElementById('bg-preset-row');
  row.innerHTML = BG_PRESETS.map(p => `
    <div class="bg-preset${cfg.id === p.id ? ' on' : ''}" style="background:${p.gradient}" onclick="selectBgPreset('${p.id}')">
      ${cfg.id === p.id ? '<span class="bg-preset-check">✓</span>' : ''}
      <span class="bg-preset-label">${p.label}</span>
    </div>`).join('') + `
    <div class="bg-preset bg-preset-custom${cfg.id === 'custom' ? ' on' : ''}" onclick="selectBgPreset('custom')">
      ${cfg.id === 'custom' ? '<span class="bg-preset-check" style="color:#78716c">✓</span>' : ''}
      <span class="bg-preset-label" style="color:#78716c">自定义</span>

function selectBgPreset(id) {
  const urlSec = document.getElementById('bg-url-section');
  const spacer = document.getElementById('bg-no-url-spacer');
  const cfg = { id };
  renderBgPresets(cfg);
  if (id === 'custom') {
    urlSec.classList.remove('hidden');
    spacer.style.display = 'none';
    const existCfg = loadBgConfig();
    document.getElementById('bg-url-input').value = existCfg.url || '';
  } else {
    urlSec.classList.add('hidden');
    spacer.style.display = '';
    saveBgConfig(cfg);
    applyBg(cfg);
  }
}

function saveBgCustomUrl() {
  const url = document.getElementById('bg-url-input').value.trim();
  if (!url) { alert('请输入图片链接'); return; }
  const cfg = { id:'custom', url };
  saveBgConfig(cfg);
  applyBg(cfg);
  closeBgSettings();
}

// ── 初始化 ──
migrateDakaDataIfNeeded();
applyBg(loadBgConfig());
renderDakaList();
</script>
